name: Generate Images

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate images
        env:
          IMAGE_WORKER_URL: ${{ secrets.IMAGE_WORKER_URL }}
          R2_PUBLIC_BASE: ${{ secrets.R2_PUBLIC_BASE }}
          SITE_ID: dictationsolutions
        run: node generate-images.js

      - name: Commit updated manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/image-manifest.json
          git diff --staged --quiet || git commit -m "chore: update image manifest [skip ci]"
          git push
